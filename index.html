<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운동 카운터</title>
    <style>
        /* 기본 화면 설정 */
        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            height: 100vh; 
            background-color: #121212; color: #ffffff; 
            font-family: -apple-system, sans-serif; text-align: center; 
            user-select: none; 
            touch-action: manipulation; 
            overflow: hidden;
            position: relative; /* 리셋 버튼 위치 기준점 */
        }
        .section { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        
        /* 🔄 리셋 버튼 (우측 상단) */
        .reset-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid #666;
            color: #aaa;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            z-index: 10; /* 항상 맨 위에 보이게 */
        }
        .reset-btn:active { background: #333; color: #fff; }

        /* 상단: 타이머 영역 (간격 문제 해결) */
        .timer-section { flex-direction: row; gap: 40px; background-color: #1e1e1e; position: relative; }
        .timer-btn { 
            font-size: 1.5rem; font-weight: bold; width: 80px; height: 80px; 
            border-radius: 50%; border: none; background-color: #333; color: white; cursor: pointer;
        }
        .timer-btn:active { background-color: #555; }
        .timer-display { font-size: 4rem; font-weight: bold; width: auto; } /* width를 auto로 변경하여 겹침 방지 */

        /* 중앙: 카운터 영역 */
        .counter-section { font-size: 13rem; font-weight: bold; background-color: #121212; }

        /* 하단: 버튼 영역 */
        .button-section { flex-direction: row; background-color: #1e1e1e; padding: 15px; box-sizing: border-box;}
        .count-btn { 
            flex: 1; margin: 10px; height: 85%; border-radius: 20px; 
            font-size: 3rem; font-weight: bold; border: none; color: white; cursor: pointer;
        }
        .btn-increase { background-color: #4CAF50; }
        .btn-increase:active { background-color: #45a049; }
        .btn-decrease { background-color: #f44336; }
        .btn-decrease:active { background-color: #da190b; }
    </style>
</head>
<body>

    <button class="reset-btn" onclick="resetAll()">리셋</button>

    <div class="section timer-section">
        <button class="timer-btn" onclick="adjustTime(15)">+15</button>
        <div class="timer-display" id="timerDisplay">01:00</div>
        <button class="timer-btn" onclick="adjustTime(-15)">-15</button>
    </div>

    <div class="section counter-section" id="counterDisplay">00</div>

    <div class="section button-section">
        <button class="count-btn btn-increase" onclick="increaseCounter()">카운터 +</button>
        <button class="count-btn btn-decrease" onclick="decreaseCounter()">카운터 -</button>
    </div>

    <script>
        let setTime = 60; // 목표 설정 시간
        let timeLeft = 0; // 현재 카운트다운 시간
        let timerInterval = null;
        let count = 0; // 세트 카운터
        
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBeep(frequency, duration) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime); 
            
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function updateTimerDisplay(seconds) {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById('timerDisplay').innerText = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function adjustTime(seconds) {
            setTime += seconds;
            if (setTime > 60) setTime = 60; 
            if (setTime < 0) setTime = 0;   
            
            if (!timerInterval) updateTimerDisplay(setTime);
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval); 
            
            timeLeft = setTime; 
            updateTimerDisplay(timeLeft);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay(timeLeft);
                
                if (timeLeft === 3 || timeLeft === 2 || timeLeft === 1) playBeep(800, 0.15); 
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    playBeep(600, 0.5); 
                }
            }, 1000);
        }

        function increaseCounter() {
            initAudio(); 
            count++;
            if (count > 99) count = 99;
            document.getElementById('counterDisplay').innerText = count.toString().padStart(2, '0');
            startTimer(); 
        }

        function decreaseCounter() {
            initAudio(); 
            count--;
            if (count < 0) count = 0;
            document.getElementById('counterDisplay').innerText = count.toString().padStart(2, '0');
        }

        // 🔄 초기화(리셋) 기능
        function resetAll() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            setTime = 60; // 타이머 기준 1분으로 원상복구
            count = 0;    // 카운터 0으로 원상복구
            updateTimerDisplay(setTime);
            document.getElementById('counterDisplay').innerText = "00";
        }

        let wakeLock = null;
        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } 
            catch (err) { console.error(err); }
        }
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });
        document.body.addEventListener('click', requestWakeLock, { once: true });

        updateTimerDisplay(setTime);
    </script>
</body>
</html>
